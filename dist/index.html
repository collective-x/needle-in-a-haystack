<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Needle in a Haystack — Women's Health Research</title>
  <meta name="description" content="Women make up half the world's population. They receive 4% of biomedical research funding. A 3D visualization of the disparity.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #1c1815;
      font-family: 'Inter', system-ui, sans-serif;
      color: #b8a88c;
      -webkit-font-smoothing: antialiased;
    }

    canvas { display: block; }

    #scene { position: fixed; inset: 0; }

    /* ── Title — top left ─────────────────────────────────────────── */

    #title {
      position: fixed;
      top: clamp(24px, 4vh, 48px);
      left: clamp(24px, 4vw, 64px);
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }

    #title h1 {
      font-size: clamp(11px, 1.1vw, 15px);
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #b8a88c;
    }

    #title p {
      margin-top: 6px;
      font-size: clamp(10px, 0.85vw, 12px);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7d6e5c;
    }

    /* ── Stats — bottom left ──────────────────────────────────────── */

    #stats {
      position: fixed;
      bottom: clamp(32px, 5vh, 64px);
      left: clamp(24px, 4vw, 64px);
      z-index: 10;
      pointer-events: none;
      user-select: none;
      opacity: 0;
      transform: translateY(12px);
    }

    #stats.visible {
      animation: fade-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    #stats .pct {
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 300;
      line-height: 1;
      color: #e8a030;
      letter-spacing: -0.02em;
    }

    #stats .body-text {
      margin-top: 12px;
      font-size: clamp(14px, 1.3vw, 18px);
      font-weight: 400;
      line-height: 1.55;
      color: #b8a88c;
      max-width: 420px;
    }

    #stats .body-text em {
      font-style: normal;
      color: #e8a030;
      font-weight: 500;
    }

    #stats .secondary {
      margin-top: 16px;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 400;
      line-height: 1.6;
      color: #8a7a68;
      max-width: 380px;
    }

    /* ── Attribution — top right ───────────────────────────────────── */

    #attribution {
      position: fixed;
      top: clamp(24px, 4vh, 48px);
      right: clamp(24px, 4vw, 64px);
      z-index: 10;
      pointer-events: none;
      user-select: none;
      font-size: clamp(9px, 0.75vw, 11px);
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4a4238;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-YqFhbyi0.js"></script>
</head>
<body>
  <div id="scene"></div>

  <div id="title">
    <h1>Needle in a Haystack</h1>
    <p>Women's Health Research</p>
  </div>

  <div id="stats">
    <div class="pct">4.0%</div>
    <p class="body-text">
      Of 10,000 research papers discovered, only <em>400</em> address women's health.
    </p>
    <p class="secondary">
      Less than 4% of biomedical research funding goes to
      female-specific conditions. One needle. Thousands of cubes.
    </p>
  </div>

  <div id="attribution">CollectiveX Health</div>

</body>
</html>
